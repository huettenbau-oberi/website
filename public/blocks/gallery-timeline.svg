<svg width="300" height="180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="180" fill="#C4B7B1"/>

  <!-- Corner brackets -->
  <path d="M22 22 L22 44 M22 22 L44 22" stroke="#171716" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M278 158 L278 136 M278 158 L256 158" stroke="#171716" stroke-width="2" fill="none" opacity="0.45"/>

  <!-- Timeline track (thin, spans first to last circle centre) -->
  <line x1="150" y1="44" x2="150" y2="148" stroke="#171716" stroke-width="1" opacity="0.25"/>

  <!-- Timeline fill (thick red, partial — top ~55%) -->
  <line x1="150" y1="44" x2="150" y2="103" stroke="#EA3936" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- ── Item 1 (right side) ─────────────────────────── -->
  <!-- Year badge -->
  <rect x="139" y="30" width="22" height="9" rx="1" fill="#EA3936"/>
  <!-- Circle node (first — rail starts here) -->
  <circle cx="150" cy="44" r="5" fill="#C4B7B1" stroke="#EA3936" stroke-width="2"/>
  <!-- Card -->
  <rect x="162" y="48" width="106" height="60" rx="2" fill="#F6F0E5"/>
  <!-- Card image area -->
  <rect x="162" y="48" width="106" height="38" rx="2" fill="#171716" opacity="0.18"/>
  <!-- Gradient overlay -->
  <rect x="162" y="68" width="106" height="18" fill="#171716" opacity="0.2"/>
  <!-- Title on image -->
  <rect x="168" y="74" width="68" height="6" rx="1" fill="#FFFCF7" opacity="0.8"/>
  <!-- Date -->
  <rect x="162" y="92" width="38" height="3" rx="1" fill="#171716" opacity="0.3"/>
  <!-- Description lines -->
  <rect x="162" y="99" width="98" height="3" rx="1" fill="#171716" opacity="0.18"/>
  <rect x="162" y="105" width="80" height="3" rx="1" fill="#171716" opacity="0.18"/>

  <!-- ── Item 2 (left side) ──────────────────────────── -->
  <!-- Year badge -->
  <rect x="139" y="119" width="22" height="9" rx="1" fill="#EA3936" opacity="0.5"/>
  <!-- Circle node (last — rail ends here) -->
  <circle cx="150" cy="148" r="5" fill="#C4B7B1" stroke="#EA3936" stroke-width="2" opacity="0.6"/>
  <!-- Card -->
  <rect x="32" y="123" width="106" height="44" rx="2" fill="#F6F0E5"/>
  <!-- Card image area -->
  <rect x="32" y="123" width="106" height="28" rx="2" fill="#171716" opacity="0.12"/>
  <!-- Title on image -->
  <rect x="38" y="138" width="58" height="6" rx="1" fill="#FFFCF7" opacity="0.6"/>
  <!-- Date -->
  <rect x="32" y="155" width="34" height="3" rx="1" fill="#171716" opacity="0.2"/>
</svg>
