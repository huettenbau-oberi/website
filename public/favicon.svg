<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150">
<style>
  #favicon-light { display: none; }
  @media (prefers-color-scheme: dark) {
    #favicon-dark { display: none; }
    #favicon-light { display: inline; }
  }
</style>
<image id="favicon-dark" width="150" height="150" href="data:image/png;base64,"/>
<image id="favicon-light" width="150" height="150" href="data:image/png;base64,"/>
</svg>
