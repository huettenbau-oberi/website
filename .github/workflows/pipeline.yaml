name: Pipeline ⚙️

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  NODE_OPTIONS: --no-deprecation
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    name: Version 🏷️
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute and push version tag
        id: tag
        env:
          MAJOR_VERSION: ${{ vars.MAJOR_VERSION }}
        run: |
          if [ -z "${MAJOR_VERSION}" ]; then
            echo "::error::MAJOR_VERSION is not set — define it as a repository variable"
            exit 1
          fi

          echo "::debug::MAJOR_VERSION=${MAJOR_VERSION}"
          LATEST=$(git tag --list "v${MAJOR_VERSION}.*" --sort=-v:refname | head -n1)
          echo "::debug::Latest tag found: '${LATEST}'"

          if [[ "$LATEST" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            NEW_TAG="v${MAJOR_VERSION}.${MINOR}.$((PATCH + 1))"
            echo "::notice::Bumping patch: ${LATEST} → ${NEW_TAG}"
          else
            NEW_TAG="v${MAJOR_VERSION}.0.0"
            echo "::notice::No parseable tag found — starting at ${NEW_TAG}"
          fi

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "::notice::Pushing tag ${NEW_TAG} to origin"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          else
            echo "::notice::Branch '${GITHUB_REF_NAME}' — skipping tag push, reporting next version: '${NEW_TAG}'"
            echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build 🏗️
    needs: version
    runs-on: blacksmith-8vcpu-ubuntu-2404
    environment: ${{ github.ref_name == 'develop' && 'devt' || 'prod' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.version.outputs.tag }},enable=${{ github.ref == 'refs/heads/main' && needs.version.outputs.tag != '' }}

      # Layer cache is stored in the GitHub Actions cache so warm builds are fast.
      - name: Build
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          load: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_SERVER_URL=https://${{ github.ref_name == 'develop' && 'dev.' || '' }}huettenbau-oberi.ch
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=${{ vars.UMAMI_SCRIPT_URL || '' }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ vars.UMAMI_WEBSITE_ID || '' }}
            COMMIT_HASH=${{ steps.version.outputs.sha }}
            VERSION=${{ needs.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    name: Deploy 🚀
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == 'develop' && 'devt' || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Prepare Ansible
        working-directory: ansible
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass

          cat <<'EOF' > inventory.ini
          [hetzner]
          webserver ansible_host=YOUR_VPS_IP ansible_user=root ansible_port=YOUR_VPS_PORT ansible_ssh_private_key_file=~/.ssh/id_ed25519

          [hetzner:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

          sed -i 's/YOUR_VPS_IP/${{ secrets.ANSIBLE_HOST }}/g' inventory.ini
          sed -i 's/YOUR_VPS_PORT/${{ secrets.ANSIBLE_PORT }}/g' inventory.ini
          sed -i 's/root/${{ secrets.ANSIBLE_USER }}/g' inventory.ini
          mkdir -p ~/.ssh
          ansible-vault decrypt files/ansible.key
          mv files/ansible.key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -p ${{ secrets.ANSIBLE_PORT }} -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

          ansible-galaxy collection install -r requirements.yml
      - name: Deploy with Ansible
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/deploy.yml -e @group_vars/${{ github.ref_name == 'develop' && 'devt' || 'prod' }}.yml
