name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run for the same ref so pushes don't queue up
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  NODE_OPTIONS: --no-deprecation
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
# Shared PostgreSQL service snippet (YAML anchors keep the file DRY)
# ─────────────────────────────────────────────────────────────────────────────
# Note: GitHub Actions doesn't support top-level anchors, so the service block
# is repeated per-job. All jobs use the same credentials; each gets its own DB.

jobs:
  # ── 1. Lint & type-check ──────────────────────────────────────────────────
  # Runs without a database — fast first gate that catches obvious problems.
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript
        run: pnpm exec tsc --noEmit

  # ── 2. Integration tests ──────────────────────────────────────────────────
  # Vitest tests under tests/int/ — needs a live Postgres instance.
  test-integration:
    name: Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: payload_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/payload_test
      PAYLOAD_SECRET: ci-secret-only
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-cron
      PREVIEW_SECRET: ci-preview
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm test:int

  # ── 3. Docker build & push ────────────────────────────────────────────────
  # Builds the production Docker image using the Dockerfile (standalone output)
  # and pushes it to ghcr.io tagged with the commit SHA.
  # generateStaticParams has a try/catch so the build succeeds without a DB.
  build:
    name: Build & Push Image
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Layer cache is stored in the GitHub Actions cache so warm builds are fast.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://huettenbau-oberi.ch
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. E2E tests ──────────────────────────────────────────────────────────
  # Playwright tests run against `pnpm dev` (not the production build), so
  # this job is independent of the Docker build job.
  # The HTML report is always uploaded so failures are easy to investigate.
  test-e2e:
    name: E2E Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: payload_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/payload_e2e
      PAYLOAD_SECRET: ci-secret-only
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-cron
      PREVIEW_SECRET: ci-preview
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create database schema
        run: pnpm payload migrate:create --name initial --forceAcceptWarning

      - name: Run database migrations
        run: pnpm payload migrate

      # Cache the Playwright browser binaries — they are large and slow to download.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 5. Deploy ─────────────────────────────────────────────────────────────
  # Only runs on a push to main after all tests pass and the image is pushed.
  # Uses a protected "production" environment so deployments can require
  # manual approval in the GitHub repository settings.
  deploy:
    name: Deploy
    needs: [test-integration, test-e2e, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    env:
      IMAGE: ${{ needs.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      # The image is already pushed to ghcr.io by the build job.
      # Pull it here so deploy scripts can reference it by digest.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Replace the step below with your hosting provider ──────────────────
      # Coolify:  curl -X POST "${{ secrets.COOLIFY_WEBHOOK }}"
      # Portainer: curl -X POST "${{ secrets.PORTAINER_WEBHOOK }}"
      # SSH:      ssh user@host "docker pull $IMAGE && docker compose up -d"
      - name: Deploy
        run: |
          echo "Image: $IMAGE"
          echo "🚀 Configure your deployment provider here"
