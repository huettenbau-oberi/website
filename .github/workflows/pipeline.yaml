name: Pipeline ⚙️

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  NODE_OPTIONS: --no-deprecation
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build 🏗️
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Layer cache is stored in the GitHub Actions cache so warm builds are fast.
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_SERVER_URL=https://${{ github.ref_name == 'develop' && 'dev.' || '' }}huettenbau-oberi.ch
            COMMIT_HASH=${{ steps.version.outputs.sha }}
            VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    name: Deploy 🚀
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == 'develop' && 'devt' || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare Ansible
        working-directory: ansible
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass

          cat <<'EOF' > inventory.ini
          [hetzner]
          webserver ansible_host=YOUR_VPS_IP ansible_user=root ansible_port=YOUR_VPS_PORT ansible_ssh_private_key_file=~/.ssh/id_ed25519

          [hetzner:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

          sed -i 's/YOUR_VPS_IP/${{ secrets.ANSIBLE_HOST }}/g' inventory.ini
          sed -i 's/YOUR_VPS_PORT/${{ secrets.ANSIBLE_PORT }}/g' inventory.ini
          sed -i 's/root/${{ secrets.ANSIBLE_USER }}/g' inventory.ini
          mkdir -p ~/.ssh
          ansible-vault decrypt files/ansible.key
          mv files/ansible.key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -p ${{ secrets.ANSIBLE_PORT }} -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

          ansible-galaxy collection install -r requirements.yml
      - name: Deploy with Ansible
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini deploy.yml -e @group_vars/${{ github.ref_name == 'develop' && 'devt' || 'prod' }}.yml
