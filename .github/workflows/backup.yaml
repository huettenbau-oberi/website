name: Backup 📦

on:
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Override retention days for both environments (leave blank to use per-environment defaults)"
        required: false
        type: number
  schedule:
    - cron: "0 3 * * */3"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  auto-backup:
    name: "Backup ${{ matrix.environment }} 📁"
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: ${{ github.event_name != 'workflow_dispatch' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: devt
            retention_days: 7
          - environment: prod
            retention_days: 30
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Ansible
        uses: ./.github/actions/ansible-prepare
        with:
          vault_password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          ansible_host: ${{ secrets.ANSIBLE_HOST }}
          ansible_port: ${{ secrets.ANSIBLE_PORT }}
          ansible_user: ${{ secrets.ANSIBLE_USER }}

      - name: Run backup playbook
        working-directory: ansible
        run: >
          ansible-playbook -i inventory.ini
          playbooks/backup.yml
          -e @group_vars/${{ matrix.environment }}.yml
          --extra-vars retention_days=${{ matrix.retention_days }}

  backup:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: "Backup 📁"
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    environment: ${{ github.ref_name == 'develop' && 'devt' || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Prepare Ansible
        uses: ./.github/actions/ansible-prepare
        with:
          vault_password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          ansible_host: ${{ secrets.ANSIBLE_HOST }}
          ansible_port: ${{ secrets.ANSIBLE_PORT }}
          ansible_user: ${{ secrets.ANSIBLE_USER }}
      - name: Run backup playbook
        working-directory: ansible
        run: >
          ansible-playbook -i inventory.ini
          playbooks/backup.yml
          -e @group_vars/${{ github.ref_name == 'develop' && 'devt' || 'prod' }}.yml
          --extra-vars retention_days=${{ github.event.inputs.retention_days || '' }}
