name: Update 🔄

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    name: Patch & Restart Services 🛠️
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: prod
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Ansible
        uses: ./.github/actions/ansible-prepare
        with:
          vault_password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          ansible_host: ${{ secrets.ANSIBLE_HOST }}
          ansible_port: ${{ secrets.ANSIBLE_PORT }}
          ansible_user: ${{ secrets.ANSIBLE_USER }}

      - name: Update system and restart services
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/update_prod.yml
