---
- name: Initial VPS Setup
  hosts: hetzner
  become: true

  vars_files:
    - ../group_vars/prod.yml
    - ../files/cloudflare.vault
    - ../files/setup.vault

  vars:
    public_interface: "{{ ansible_default_ipv6.interface | default(ansible_default_ipv4.interface) }}"
    ipv6_ndp_proxy_subnets:
      - "{{ ipv6_subnet }}"
      - "{{ devt_ipv6_subnet }}"

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: Restart Fail2Ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted

    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Restart ndppd
      ansible.builtin.systemd:
        name: ndppd
        state: restarted

    - name: Restart Traefik
      community.docker.docker_compose_v2:
        project_src: "{{ traefik_dir }}"
        state: present
        recreate: always

  tasks:
    # ── System ──────────────────────────────────────────────────────────────
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Install common utilities
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - gnupg
          - ufw
          - s3cmd
        state: present

    # ── SSH ─────────────────────────────────────────────────────────────────
    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: Restart SSH

    - name: Disable SSH challenge-response authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?KbdInteractiveAuthentication"
        line: "KbdInteractiveAuthentication no"
        state: present
      notify: Restart SSH

    - name: Disable SSH PAM authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?UsePAM"
        line: "UsePAM no"
        state: present
      notify: Restart SSH

    - name: Change SSH port
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Port"
        line: "Port {{ ssh_port }}"
        state: present
      notify: Restart SSH

    # ── Fail2Ban ────────────────────────────────────────────────────────────
    - name: Install Fail2Ban
      ansible.builtin.apt:
        name: fail2ban
        state: present

    - name: Configure Fail2Ban jail
      ansible.builtin.template:
        src: ../templates/fail2ban/jail.local.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: "0644"
      notify: Restart Fail2Ban

    - name: Enable and start Fail2Ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

    # ── Docker ──────────────────────────────────────────────────────────────
    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        owner: root
        group: root
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
          Suites: {{ ansible_facts['distribution_release'] }}
          Components: stable
          Architectures: {{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'armv7l': 'armhf'}[ansible_facts['architecture']] }}
          Signed-By: /etc/apt/keyrings/docker.asc

    - name: Install Docker CE and compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Configure Docker daemon for IPv6 support
      ansible.builtin.copy:
        content: |
          {
            "ipv6": true,
            "ip6tables": true
          }
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
      notify: Restart Docker

    # ── IPv6 NDP Proxy ──────────────────────────────────────────────────────
    # Docker bridge networks (ip6net) carve subnets out of the host's routed
    # /64. For the upstream router to deliver traffic for those addresses,
    # the host must forward IPv6 and proxy NDP for them on its public
    # interface.
    - name: Enable IPv6 forwarding and NDP proxying
      ansible.builtin.copy:
        content: |
          net.ipv6.conf.all.forwarding = 1
          net.ipv6.conf.all.proxy_ndp = 1
        dest: /etc/sysctl.d/99-ipv6-ndp-proxy.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reload sysctl

    - name: Install ndppd
      ansible.builtin.apt:
        name: ndppd
        state: present

    - name: Configure ndppd
      ansible.builtin.template:
        src: ../templates/ndppd/ndppd.conf.j2
        dest: /etc/ndppd.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart ndppd

    - name: Enable and start ndppd
      ansible.builtin.systemd:
        name: ndppd
        enabled: true
        state: started

    # ── Docker network ───────────────────────────────────────────────────────
    - name: Create shared proxy network for Traefik
      community.docker.docker_network:
        name: "{{ docker_network_name }}"
        state: present

    # ── Traefik ──────────────────────────────────────────────────────────────
    - name: Create Traefik directory
      ansible.builtin.file:
        path: "{{ traefik_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create Traefik letsencrypt directory
      ansible.builtin.file:
        path: "{{ traefik_dir }}/letsencrypt"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Copy .env file to server
      ansible.builtin.template:
        src: "../templates/traefik/traefik.env.j2"
        dest: "{{ traefik_dir }}/.env"
        owner: root
        group: root
        mode: "0600"

    - name: Create acme.json for Let's Encrypt certificates
      ansible.builtin.copy:
        content: "{}"
        dest: "{{ traefik_dir }}/letsencrypt/acme.json"
        force: false
        owner: root
        group: root
        mode: "0600"

    - name: Deploy Traefik static config
      ansible.builtin.template:
        src: ../templates/traefik/traefik.yml.j2
        dest: "{{ traefik_dir }}/traefik.yml"
        owner: root
        group: root
        mode: "0644"
      notify: Restart Traefik

    - name: Deploy Traefik docker-compose
      ansible.builtin.template:
        src: ../templates/traefik/docker-compose.yml.j2
        dest: "{{ traefik_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0644"
      notify: Restart Traefik

    - name: Start Traefik
      community.docker.docker_compose_v2:
        project_src: "{{ traefik_dir }}"
        state: present

