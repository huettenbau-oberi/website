---
# Create an AES-256 encrypted backup of a Payload CMS environment.
# Includes a pg_dump (custom format) of the environment database and
# a hard copy of the media files from the deployment directory.
#
# The final archive is left at /tmp/<name>.tar.enc on the server.
# Decrypt and extract with:
#   openssl enc -d -aes-256-cbc -pbkdf2 -pass pass:<password> \
#     -in <name>.tar.gz.enc | tar -xzf -
#
# Usage:
#   ansible-playbook -i inventory.ini playbooks/backup.yml -e @group_vars/prod.yml
#   ansible-playbook -i inventory.ini playbooks/backup.yml -e @group_vars/devt.yml

- name: Backup Payload CMS environment
  hosts: hetzner
  become: true

  vars_files:
    - ../files/postgres_users.vault
    - ../files/backup.vault

  vars:
    env_name: "{{ deploy_dir | basename }}"
    postgres_container: "huettenbau-oberi-prod_postgres"

  tasks:
    - name: Freeze backup timestamp
      ansible.builtin.set_fact:
        backup_timestamp: "{{ now().strftime('%Y%m%d-%H%M%S') }}"

    - name: Set backup name and paths
      ansible.builtin.set_fact:
        backup_name: "{{ env_name }}-huettenbau-backup_{{ backup_timestamp }}"
        backup_tmp_dir: "/tmp/{{ env_name }}-huettenbau-backup_{{ backup_timestamp }}"

    - name: Create backup staging directory
      ansible.builtin.file:
        path: "{{ backup_tmp_dir }}"
        state: directory
        mode: "0700"

    - name: Dump database into container temp file
      community.docker.docker_container_exec:
        container: "{{ postgres_container }}"
        env:
          PGPASSWORD: "{{ pg_admin_password }}"
        argv:
          - pg_dump
          - -U
          - "{{ pg_admin_user }}"
          - -d
          - "{{ backup_database_name }}"
          - -Fc
          - -f
          - /tmp/{{ backup_name }}_db.dump
      no_log: true
      changed_when: true

    - name: Copy dump from container to staging directory
      ansible.builtin.shell:
        cmd: "docker cp {{ postgres_container }}:/tmp/{{ backup_name }}_db.dump {{ backup_tmp_dir }}/db.dump"
      changed_when: true

    - name: Remove dump from container temp
      community.docker.docker_container_exec:
        container: "{{ postgres_container }}"
        argv:
          - rm
          - -f
          - /tmp/{{ backup_name }}_db.dump
      changed_when: false

    - name: Hard-copy media files
      ansible.builtin.shell:
        cmd: "cp -r {{ deploy_dir }}/media {{ backup_tmp_dir }}/media"
      changed_when: true

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: "{{ deploy_dir }}/docker-compose.yml"
        dest: "{{ backup_tmp_dir }}/docker-compose.yml"
        remote_src: true

    - name: Create tarball from staging directory
      ansible.builtin.shell:
        cmd: "tar -czf /tmp/{{ backup_name }}.tar.gz -C /tmp {{ backup_name }}"
      changed_when: true

    - name: Encrypt tarball with AES-256-CBC
      ansible.builtin.shell:
        cmd: >
          openssl enc -aes-256-cbc -pbkdf2
          -pass env:BACKUP_PASSWORD
          -in /tmp/{{ backup_name }}.tar.gz
          -out /tmp/{{ backup_name }}.tar.gz.enc
      environment:
        BACKUP_PASSWORD: "{{ backup_archive_password }}"
      changed_when: true
      no_log: true

    - name: Remove unencrypted tarball
      ansible.builtin.file:
        path: "/tmp/{{ backup_name }}.tar.gz"
        state: absent

    - name: Remove staging directory
      ansible.builtin.file:
        path: "{{ backup_tmp_dir }}"
        state: absent

    - name: Ensure s3cmd is installed
      ansible.builtin.apt:
        name: s3cmd
        state: present

    - name: Upload backup to Hetzner Object Storage
      ansible.builtin.shell:
        cmd: >
          s3cmd put /tmp/{{ backup_name }}.tar.gz.enc
          s3://{{ s3_bucket }}/{{ path_prefix }}/{{ backup_name }}.tar.gz.enc
          --access_key={{ s3_access_key }}
          --secret_key={{ s3_secret_key }}
          --host={{ s3_endpoint }}
          '--host-bucket=%(bucket)s.{{ s3_endpoint }}'
          --region={{ s3_endpoint.split('.')[0] }}
          --no-encrypt
      no_log: true
      changed_when: true

    - name: Remove encrypted tarball from server
      ansible.builtin.file:
        path: "/tmp/{{ backup_name }}.tar.gz.enc"
        state: absent

    - name: Delete backups older than {{ retention_days }} days
      ansible.builtin.shell:
        cmd: |
          set -e
          CUTOFF=$(date -u -d "{{ retention_days }} days ago" '+%Y-%m-%d %H:%M')
          OLD=$(s3cmd ls 's3://{{ s3_bucket }}/{{ path_prefix }}/' \
            --access_key={{ s3_access_key }} \
            --secret_key={{ s3_secret_key }} \
            --host={{ s3_endpoint }} \
            '--host-bucket=%(bucket)s.{{ s3_endpoint }}' \
            --region={{ s3_endpoint.split('.')[0] }} | \
            awk -v cutoff="$CUTOFF" '($1 " " $2) < cutoff {print $4}')
          if [ -n "$OLD" ]; then
            echo "$OLD" | xargs s3cmd del \
              --access_key={{ s3_access_key }} \
              --secret_key={{ s3_secret_key }} \
              --host={{ s3_endpoint }} \
              '--host-bucket=%(bucket)s.{{ s3_endpoint }}' \
              --region={{ s3_endpoint.split('.')[0] }}
          fi
      no_log: true
      changed_when: false

    - name: Update backup manifest on server
      ansible.builtin.shell:
        cmd: |
          set -e
          s3cmd ls 's3://{{ s3_bucket }}/{{ path_prefix }}/' \
            --access_key={{ s3_access_key }} \
            --secret_key={{ s3_secret_key }} \
            --host={{ s3_endpoint }} \
            '--host-bucket=%(bucket)s.{{ s3_endpoint }}' \
            --region={{ s3_endpoint.split('.')[0] }} | \
          python3 -c "
          import sys, json, os
          from datetime import datetime, timezone
          lines = [l.strip() for l in sys.stdin if l.strip()]
          backups = []
          for line in lines:
              parts = line.split()
              if len(parts) >= 4 and parts[3].endswith('.enc'):
                  backups.append({
                      'name': os.path.basename(parts[3]),
                      'date': parts[0] + 'T' + parts[1] + 'Z',
                      'sizeBytes': int(parts[2])
                  })
          print(json.dumps({
              'prefix': '{{ path_prefix }}',
              'updatedAt': datetime.now(timezone.utc).isoformat(),
              'backups': sorted(backups, key=lambda x: x['date'], reverse=True)
          }))
          " > {{ deploy_dir }}/backup-manifest.json
          chmod 644 {{ deploy_dir }}/backup-manifest.json
      no_log: true
      changed_when: true

    - name: Report backup location
      ansible.builtin.debug:
        msg: "Backup uploaded to s3://{{ s3_bucket }}/{{ path_prefix }}/{{ backup_name }}.tar.gz.enc"
