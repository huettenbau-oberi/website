---
- name: Update System and Services
  hosts: hetzner
  become: true

  vars_files:
    - ../group_vars/prod.yml

  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 0

    - name: Remove unused dependencies
      ansible.builtin.apt:
        autoremove: true

    - name: Clean apt cache
      ansible.builtin.apt:
        autoclean: true

    # ── Logs ──────────────────────────────────────────────────────────────────

    - name: Vacuum journal logs older than 7 days
      ansible.builtin.command:
        cmd: journalctl --vacuum-time=7d
      changed_when: false

    # ── Reboot if required ───────────────────────────────────────────────────

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    # ── Docker services ──────────────────────────────────────────────────────
    - name: Check compose files exist
      ansible.builtin.stat:
        path: "{{ item }}/docker-compose.yml"
      loop:
        - "{{ deploy_dir }}"
        - "{{ deploy_dir_postgres }}"
        - "{{ deploy_dir_analytics }}"
        - "{{ traefik_dir }}"
      register: compose_files

    - name: Compose down app
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}"
        state: absent
      when: reboot_required.stat.exists and compose_files.results[0].stat.exists

    - name: Compose down PostgreSQL
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir_postgres }}"
        state: absent
      when: reboot_required.stat.exists and compose_files.results[1].stat.exists

    - name: Compose down analytics
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir_analytics }}"
        state: absent
      when: reboot_required.stat.exists and compose_files.results[2].stat.exists

    - name: Compose down Traefik
      community.docker.docker_compose_v2:
        project_src: "{{ traefik_dir }}"
        state: absent
      when: reboot_required.stat.exists and compose_files.results[3].stat.exists

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: reboot_required.stat.exists

    # ── Update and start services again ─────────────────────────────────────────────────

    - name: Pull and restart Traefik
      community.docker.docker_compose_v2:
        project_src: "{{ traefik_dir }}"
        pull: always
        state: present
        recreate: always
      when: compose_files.results[3].stat.exists

    - name: Pull and restart PostgreSQL
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir_postgres }}"
        pull: always
        state: present
        recreate: always
      when: compose_files.results[1].stat.exists

    - name: Pull and restart analytics
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir_analytics }}"
        pull: always
        state: present
        recreate: always
      when: compose_files.results[2].stat.exists

    - name: Pull and restart app
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}"
        pull: always
        state: present
        recreate: always
      when: compose_files.results[0].stat.exists

    # ── Docker cleanup ───────────────────────────────────────────────────────

    - name: Prune unused Docker resources
      community.docker.docker_prune:
        containers: true
        images: true
        networks: true
        builder_cache: true
      register: docker_prune_result

    - name: Report Docker space reclaimed
      ansible.builtin.debug:
        msg: >-
          Reclaimed
          {{ (docker_prune_result.containers_space_reclaimed
              + docker_prune_result.images_space_reclaimed
              + docker_prune_result.builder_cache_space_reclaimed) | filesizeformat }}
          from Docker containers, images and build cache.

    # ── Health report ────────────────────────────────────────────────────────

    - name: Check for failed systemd units
      ansible.builtin.command:
        cmd: systemctl --failed --no-legend
      register: failed_units
      changed_when: false

    - name: Report failed systemd units
      ansible.builtin.debug:
        msg: "Failed units detected:\n{{ failed_units.stdout }}"
      when: failed_units.stdout | length > 0

    - name: Check disk usage
      ansible.builtin.command:
        cmd: df -h --output=source,size,used,avail,pcent,target -x tmpfs -x devtmpfs
      register: disk_usage
      changed_when: false

    - name: Report disk usage
      ansible.builtin.debug:
        msg: "{{ disk_usage.stdout_lines }}"
