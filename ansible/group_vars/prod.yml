# --- Project ---
project_name: huettenbau-oberi-prod
deploy_dir: /opt/huettenbau-oberi/prod
# Image built and pushed by CI (e.g. GitHub Actions → GHCR)
app_image: ghcr.io/huettenbau-oberi/website
app_image_tag: latest
env_file: files/prod.env

# --- PostgreSQL ---
deploy_dir_postgres: "/opt/postgres"
app_image_tag_postgres: "postgres:15-alpine"
devt_database_name: huettenbau-payload-devt
prod_database_name: huettenbau-payload-prod

# --- Domain & TLS ---
domain: huettenbau-oberi.ch
letsencrypt_email: webmaster@huettenbau-oberi.ch

# --- Traefik ---
traefik_dir: /opt/traefik
traefik_version: latest
# Shared Docker network used by Traefik and all proxied services
docker_network_name: proxy
# Basic-auth credentials for the Traefik dashboard (leave empty to disable).
# Generate with: echo $(htpasswd -nB admin) | sed -e 's/\$/\$\$/g'
traefik_dashboard_auth: ""
