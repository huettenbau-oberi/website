# --- Project ---
# ! turnstile site key is embedded in dockerfile
project_name: huettenbau-oberi-devt
deploy_dir: /opt/huettenbau-oberi/devt
# Image built and pushed by CI (e.g. GitHub Actions → GHCR)
app_image: ghcr.io/huettenbau-oberi/website
app_image_tag: develop
env_file: ../files/devt.env.vault

# --- IPv6 ---
ipv6_subnet: 2a01:4f8:c015:3aa0:0:3773:840:d000/116
ipv6_address: 2a01:4f8:c015:3aa0:0:3773:840:de41

# --- PostgreSQL ---
pg_app_user: "{{ pg_devt_user }}"
devt_database_name: huettenbau-payload-devt
backup_database_name: "{{ devt_database_name }}"
postgres_container_name: huettenbau-oberi-prod_postgres

# --- Backups ---
s3_bucket: huettenbau-oberi-backup
s3_endpoint: fsn1.your-objectstorage.com
path_prefix: devt
retention_days: 7

# --- Domain & TLS ---
domain: dev.huettenbau-oberi.ch
letsencrypt_email: webmaster@huettenbau-oberi.ch
